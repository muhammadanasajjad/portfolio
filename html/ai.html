<!-- Input bar, mirrors opencode's bottom bar -->
<div id="input-area">
    <div id="input-bar-inner">
        <span class="input-prompt">$</span>
        <input id="input" placeholder='Ask anything... "What has Anas worked on?"' autocomplete="off" />
    </div>
    <div id="statusbar">
        <span class="sb-mode">ask</span>
        <span class="sb-sep">·</span>
        <span class="sb-profile">Anas</span>
        <span class="sb-provider">MiniMax M2.5</span>
        <span class="sb-right">
            <span class="sb-hint"><kbd>ctrl+l</kbd> clear</span>
            <span class="sb-hint"><kbd>↑↓</kbd> history</span>
            <span class="sb-hint"><kbd>enter</kbd> send</span>
        </span>
    </div>
</div>
